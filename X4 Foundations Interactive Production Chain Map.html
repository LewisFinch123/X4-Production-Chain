<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X4 基石 · 生产链全景图谱 v9.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+SC:wght@300;400;600;700&display=swap');

  :root {
    --bg-base: #141720;
    --monet-blue: rgba(94, 126, 170, 0.25);
    --monet-green: rgba(105, 149, 128, 0.25);
    --monet-pink: rgba(173, 121, 135, 0.25);
    --monet-gold: rgba(212, 175, 55, 0.15);

    --mucha-gold: #d4af37;
    --mucha-light-gold: #f9e596;
    --mucha-dark-gold: #8c7322;
    --mucha-bronze: #b07a44;
    --mucha-panel: rgba(20, 23, 32, 0.85);

    --text-main: #f3e5ab;
    --text-dim: #b8a97b;

    --raw-bg: linear-gradient(135deg, rgba(44,62,53,0.8), rgba(30,43,37,0.8));
    --raw-bdr: #699580;
    --raw-glow: #a3d4bd;

    --mid-bg: linear-gradient(135deg, rgba(43,58,85,0.8), rgba(30,38,56,0.8));
    --mid-bdr: #5e7eaa;
    --mid-glow: #96b9e5;

    --fin-bg: linear-gradient(135deg, rgba(74,50,61,0.8), rgba(51,34,42,0.8));
    --fin-bdr: #ad7987;
    --fin-glow: #e5b0c0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg-base);
    color: var(--text-main);
    font-family: 'Noto Serif SC', 'Cinzel', serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      radial-gradient(circle at 15% 25%, var(--monet-blue) 0%, transparent 45%),
      radial-gradient(circle at 85% 15%, var(--monet-pink) 0%, transparent 50%),
      radial-gradient(circle at 50% 85%, var(--monet-green) 0%, transparent 55%),
      radial-gradient(circle at 80% 80%, var(--monet-gold) 0%, transparent 40%);
    filter: blur(40px);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image: radial-gradient(var(--mucha-dark-gold) 0.5px, transparent 0.5px);
    background-size: 30px 30px;
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 2px solid var(--mucha-dark-gold);
    background: linear-gradient(180deg, var(--mucha-panel) 0%, transparent 100%);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .logo {
    font-family: 'Cinzel', serif;
    font-size: 26px; font-weight: 700;
    letter-spacing: 6px; color: var(--mucha-light-gold);
    text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
  }
  .logo span { font-family: 'Noto Serif SC', serif; font-size: 22px; letter-spacing: 4px;}
  .logo-sub { 
    font-family: 'Cinzel', serif;
    font-size: 12px; letter-spacing: 4px; 
    color: var(--text-dim); margin-top: 4px; 
  }

  .lang-switch-container {
    display: flex;
    align-items: center;
    background: rgba(20, 23, 32, 0.9);
    border: 1px solid var(--mucha-gold);
    outline: 1px solid var(--mucha-gold);
    outline-offset: -4px;
    padding: 3px 6px;
    border-radius: 14px 4px 14px 4px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    z-index: 101;
    user-select: none;
    transition: all 0.3s ease;
    gap: 4px;
  }
  .lang-item {
    color: var(--text-dim);
    font-family: 'Noto Serif SC', 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 5px 10px;
    border-radius: 10px 2px 10px 2px;
    transition: all 0.2s ease;
    cursor: pointer;
    pointer-events: auto;
  }
  .lang-item.active {
    color: var(--bg-base);
    background: var(--mucha-light-gold);
    font-weight: 700;
  }

  .legend {
    display: flex; gap: 36px; align-items: center; justify-content: center;
    padding: 14px 40px;
    background: rgba(20, 23, 32, 0.6);
    border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    font-size: 13px; letter-spacing: 2px;
    position: relative; z-index: 10;
    backdrop-filter: blur(5px);
  }
  .ldot {
    display: inline-block; width: 12px; height: 12px;
    border-radius: 50%; border: 1.5px solid; margin-right: 8px;
    vertical-align: middle;
  }
  .ldot.r { border-color: var(--raw-glow); background: var(--raw-bdr); }
  .ldot.m { border-color: var(--mid-glow); background: var(--mid-bdr); }
  .ldot.f { border-color: var(--fin-glow); background: var(--fin-bdr); }

  #wrap {
    position: relative;
    padding: 40px 40px 80px;
    min-height: calc(100vh - 120px);
  }

  svg#svg {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 1;
    overflow: visible;
  }

  .nodes { position: relative; z-index: 2; }
  .layer {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: nowrap;
  }

  .layer-raw  { margin-top: 15px; }
  .layer-mid1 { margin-top: 60px; }
  .layer-mid2 { margin-top: 50px; }
  .layer-fin  { margin-top: 70px; }

  .node {
    position: relative;
    width: 145px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    border: 1px solid var(--mucha-gold);
    outline: 1px solid var(--mucha-gold);
    outline-offset: -4px;
    font-size: 12px;
    letter-spacing: 0.5px;
    line-height: 1.3;
    transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    user-select: none;
    white-space: normal;
    word-break: break-word;
    border-radius: 18px 4px 18px 4px;
    background: var(--bg-base);
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }

  .node.raw { background: var(--raw-bg); color: #e0eee6; outline-color: var(--raw-bdr); border-color: var(--raw-bdr); }
  .node.mid { background: var(--mid-bg); color: #e6eeea; outline-color: var(--mid-bdr); border-color: var(--mid-bdr); }
  .node.fin { background: var(--fin-bg); color: #eee0e4; outline-color: var(--fin-bdr); border-color: var(--fin-bdr); }

  .node:hover { transform: translateY(-4px); z-index: 10; }
  .node.active {
    transform: translateY(-5px) scale(1.05);
    z-index: 20;
    border-color: var(--mucha-light-gold);
    outline-color: var(--mucha-light-gold);
    color: var(--mucha-light-gold);
    border-radius: 4px 18px 4px 18px;
  }

  .node.upstream {
    animation: upPulse 2s ease-in-out infinite alternate;
    z-index: 15;
    border-color: var(--mucha-gold);
  }
  @keyframes upPulse {
    from { box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
    to   { box-shadow: 0 0 25px rgba(212, 175, 55, 0.5); }
  }

  .node.dimmed { opacity: 0.15; filter: grayscale(0.8) blur(0.5px); pointer-events: none; }

  .eline { stroke: var(--mucha-dark-gold); stroke-width: 1.5; fill: none; transition: all 0.3s; opacity: 0.5; }
  .eline.hl-active {
    stroke: var(--mucha-light-gold); stroke-width: 3; opacity: 1;
    filter: drop-shadow(0 0 6px var(--mucha-gold));
  }
  .eline.hl-upstream {
    stroke: var(--mucha-gold); stroke-width: 2; opacity: 0.8;
    stroke-dasharray: 6 4;
    animation: dashFlow 1s linear infinite;
  }
  @keyframes dashFlow { to { stroke-dashoffset: -20; } }

  #info {
    position: fixed; bottom: 40px; right: 40px;
    width: 350px;
    background: var(--mucha-panel);
    border: 2px solid var(--mucha-gold);
    outline: 1px solid var(--mucha-gold);
    outline-offset: -6px;
    padding: 22px 24px;
    font-size: 13px; z-index: 200;
    transform: translateY(20px); opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    border-radius: 20px 4px 20px 4px;
    backdrop-filter: blur(15px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    max-height: 75vh;
    overflow-y: auto;
  }
  #info.vis { transform: translateY(0); opacity: 1; pointer-events: auto; }
  
  #info-title {
    font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700;
    color: var(--mucha-light-gold); border-bottom: 1px solid rgba(212,175,55,0.3);
    padding-bottom: 6px; margin-bottom: 4px; text-align: center;
  }
  #info-type { font-size: 11px; color: var(--text-dim); text-align: center; margin-bottom: 12px; }
  
  .info-meta-item { margin: 4px 0; color: var(--text-main); line-height: 1.5; }
  .info-meta-item span { color: var(--text-dim); }

  .info-section { font-size: 13px; color: var(--mucha-light-gold); margin: 14px 0 6px; font-weight: 600; border-left: 2px solid var(--mucha-gold); padding-left: 6px; }
  #info-calc-list { display: flex; flex-direction: column; gap: 4px; }
  .calc-row { display: flex; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 4px 8px; border-radius: 4px; align-items: center; gap: 8px; }
  .calc-num { color: var(--mucha-light-gold); font-family: monospace; font-size: 12px; white-space: nowrap; }

  #reset {
    position: fixed; top: 25px; right: 540px;
    background: rgba(20, 23, 32, 0.8); border: 1px solid var(--mucha-gold);
    color: var(--mucha-gold); font-family: 'Noto Serif SC', serif;
    font-size: 13px; padding: 8px 20px; cursor: pointer; z-index: 300;
    transition: all 0.3s; border-radius: 14px 4px 14px 4px; display: none;
  }
  #reset:hover { color: var(--bg-base); background: var(--mucha-gold); }
  #reset.vis { display: block; }

  .disclaimer { font-size: 10px; color: #887a55; text-align: center; margin-top: 10px; font-style: italic; }
</style>
</head>

};

let sel = null;
let selQty = 0;
const svg  = document.getElementById('svg');
const wrap = document.getElementById('wrap');
let edgeEls = [];

function setLanguage(lang, event) {
  if (event) event.stopPropagation();

  currentLang = lang;
  localStorage.setItem('x4_lang', currentLang);
  updateUILabels();
  
  drawEdges();
  if (sel) {
    const tempSel = sel;
    const tempQty = selQty;
    resetAll();
    select(tempSel);
    selQty = tempQty;
    showInfo(tempSel, tempQty);
  }
}

function updateUILabels() {
  const ln = i18n[currentLang];
  
  document.querySelectorAll('.lang-item').forEach(item => item.classList.remove('active'));
  document.getElementById(`item-lang-${currentLang}`).classList.add('active');

  document.getElementById('logo-cn').style.display = currentLang === 'zh' ? 'inline' : 'none';
  document.getElementById('reset').textContent = ln.resetBtn;
  document.getElementById('info-sec-title').textContent = ln.secTitle;
  document.getElementById('info-disc').textContent = ln.disc;

  const legendSpans = document.getElementById('page-legend').querySelectorAll('span.txt');
  legendSpans[0].textContent = ln.legendRaw;
  legendSpans[1].textContent = ln.legendMid;
  legendSpans[2].textContent = ln.legendFin;

  document.querySelectorAll('.node').forEach(nodeEl => {
    const data = meta[nodeEl.id];
    if (data) {
      nodeEl.innerHTML = data.names[currentLang] || data.names['en'];
    }
  });
}

function calculateDemands(targetId, quantity) {
  const demands = {}; 
  const targetMeta = meta[targetId];
  if (!targetMeta || !targetMeta.prodRate) return demands;

  const queue = [{ id: targetId, neededRate: targetMeta.prodRate * quantity }];

  while (queue.length > 0) {
    const { id, neededRate } = queue.shift();
    const currentMeta = meta[id];
    if (!currentMeta) continue;

    if (id !== targetId) {
      if (!demands[id]) demands[id] = 0;
      demands[id] += neededRate;
    }

    const currentModulesNeeded = neededRate / (currentMeta.prodRate || 1);

    if (currentMeta.consumes) {
      for (const [inputId, consumeAmount] of Object.entries(currentMeta.consumes)) {
        if (meta[inputId] && meta[inputId].prodRate) {
          const inputRequiredRate = currentModulesNeeded * consumeAmount;
          queue.push({ id: inputId, neededRate: inputRequiredRate });
        }
      }
    }
  }

  const moduleCounts = {};
  for (const [id, totalRate] of Object.entries(demands)) {
    if (meta[id].prodRate) {
      moduleCounts[id] = (totalRate / meta[id].prodRate).toFixed(2);
    }
  }
  return moduleCounts;
}

function upstream(target) {
  const parents = {};
  for (const [f,t] of edges) {
    if (!parents[t]) parents[t] = [];
    parents[t].push(f);
  }
  const vis = new Set();
  const q = [target];
  while (q.length) {
    const cur = q.shift();
    for (const p of (parents[cur]||[])) {
      if (!vis.has(p)) { vis.add(p); q.push(p); }
    }
  }
  return vis;
}

function center(el) {
  const wr = wrap.getBoundingClientRect();
  const r  = el.getBoundingClientRect();
  return {
    x: r.left - wr.left + r.width/2,
    y: r.top  - wr.top  + r.height/2,
    top:    r.top    - wr.top,
    bottom: r.bottom - wr.top,
  };
}

function drawEdges() {
  svg.innerHTML = '';
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `
    <marker id="ad" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,1 L0,5 L6,3 z" fill="#8c7322"/>
    </marker>
    <marker id="aa" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,1 L0,5 L6,3 z" fill="#f9e596"/>
    </marker>
    <marker id="au" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,1 L0,5 L6,3 z" fill="#d4af37"/>
    </marker>
  `;
  svg.appendChild(defs);

  edgeEls = [];
  for (const [from,to] of edges) {
    const fe = document.getElementById(from);
    const te = document.getElementById(to);
    if (!fe || !te) continue;

    const f = center(fe), t = center(te);
    const fx = f.x, fy = f.bottom - 4;
    const tx = t.x, ty = t.top    + 4;
    const dy = ty - fy;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','eline');
    path.setAttribute('marker-end','url(#ad)');
    path.setAttribute('d',`M ${fx} ${fy} C ${fx} ${fy+dy*.5}, ${tx} ${ty-dy*.5}, ${tx} ${ty}`);
    path.dataset.from = from; path.dataset.to = to;
    svg.appendChild(path);
    edgeEls.push({ from, to, el: path });
  }
}

function resetAll() {
  document.querySelectorAll('.node').forEach(n =>
    n.classList.remove('active','upstream','dimmed'));
  for (const e of edgeEls) {
    e.el.classList.remove('hl-active','hl-upstream');
    e.el.setAttribute('marker-end','url(#ad)');
  }
  sel = null;
  selQty = 0;
  document.getElementById('info').classList.remove('vis');
  document.getElementById('reset').classList.remove('vis');
}

function select(id) {
  const targetMeta = meta[id];
  
  if (!targetMeta.prodRate) {
    resetAll();
    sel = id;
    selQty = 1;
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.node').forEach(n => {
      if (n.id !== id) n.classList.add('dimmed');
    });
    showInfo(id, selQty);
    return;
  }

  if (sel === id) {
    selQty++;
  } else {
    resetAll();
    sel = id;
    selQty = 1;
  }

  const up = upstream(id);

  document.querySelectorAll('.node').forEach(n => {
    if (n.id === id)       n.classList.add('active');
    else if (up.has(n.id)) n.classList.add('upstream');
    else                   n.classList.add('dimmed');
  });

  for (const e of edgeEls) {
    const toSel   = e.to === id && up.has(e.from);
    const upChain = up.has(e.from) && up.has(e.to);
    if (toSel) {
      e.el.classList.add('hl-active');
      e.el.setAttribute('marker-end','url(#aa)');
    } else if (upChain) {
      e.el.classList.add('hl-upstream');
      e.el.setAttribute('marker-end','url(#au)');
    }
  }

  showInfo(id, selQty);
}

function showInfo(id, qty) {
  const m = meta[id];
  const ln = i18n[currentLang];
  
  const displayName = m.names[currentLang] || m.names['en'];
  let displayType = ln.typeRaw;
  if (m.type === 'mid') displayType = ln.typeMid;
  if (m.type === 'fin') displayType = ln.typeFin;

  document.getElementById('info-title').textContent = displayName + (qty > 1 ? ` (x${qty})` : '');
  document.getElementById('info-type').textContent  = displayType;
  
  const prodEl = document.getElementById('info-prod');
  if (m.prodRate) {
    prodEl.style.display = 'block';
    
    let consumeHtml = '';
    if (m.consumes) {
      consumeHtml = `<br><span style="margin-top:6px; display:inline-block; color:var(--mucha-gold); font-weight:600;">${ln.totalConsume}:</span>`;
      for (const [inputId, amount] of Object.entries(m.consumes)) {
        const inputName = meta[inputId]?.names[currentLang] || meta[inputId]?.names['en'] || inputId;
        consumeHtml += `<br><span>· ${inputName}: </span>${(amount * qty).toLocaleString()}/${ln.hour}`;
      }
    }
    
    prodEl.innerHTML = `<span>${ln.metaProd}: </span>${m.prodRate.toLocaleString()}/${ln.hour}<br><span>${ln.metaTotal}: </span> ${(m.prodRate * qty).toLocaleString()}/${ln.hour}${consumeHtml}`;
  } else {
    prodEl.style.display = 'none';
  }

  const calcList = document.getElementById('info-calc-list');
  calcList.innerHTML = '';
  
  if (!m.prodRate) {
    calcList.innerHTML = `<div style="color:var(--text-dim);font-style:italic;text-align:center;">${ln.rawTips}</div>`;
  } else {
    const upstreamModules = calculateDemands(id, qty);
    const upIds = Object.keys(upstreamModules);

    if (!upIds.length) {
      calcList.innerHTML = `<div style="color:var(--text-dim);font-style:italic;text-align:center;">${ln.noSub}</div>`;
    } else {
      upIds.forEach(uid => {
        const row = document.createElement('div');
        row.className = 'calc-row';
        
        const nameSpan = document.createElement('span');
        nameSpan.textContent = meta[uid]?.names[currentLang] || meta[uid]?.names['en'] || uid;
        
        const numSpan = document.createElement('span');
        numSpan.className = 'calc-num';
        
        const reqVal = parseFloat(upstreamModules[uid]);
        const recVal = Math.ceil(reqVal);
        numSpan.textContent = `${ln.need}:${upstreamModules[uid]} → ${ln.rec}:${recVal}`;
        
        row.appendChild(nameSpan);
        row.appendChild(numSpan);
        calcList.appendChild(row);
      });
    }
  }

  document.getElementById('info').classList.add('vis');
  document.getElementById('reset').classList.add('vis');
}

document.querySelectorAll('.node').forEach(n => {
  n.addEventListener('click', (e) => {
    e.stopPropagation();
    select(n.id);
  });
});

window.addEventListener('click', (e) => {
  if (!e.target.closest('.node') && !e.target.closest('#info') && !e.target.closest('#reset') && !e.target.closest('#lang-container')) {
    resetAll();
  }
});

function init() { 
  setTimeout(drawEdges, 80); 
  updateUILabels();
}

window.addEventListener('resize', () => {
  drawEdges();
  if (sel) { const t = sel; sel = null; select(t); }
});
init();
</script>
